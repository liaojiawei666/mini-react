<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mini React v1 - Hello World</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      padding: 40px;
      background: #f5f5f5;
    }
    #root {
      max-width: 600px;
      margin: 0 auto;
      background: white;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script>
    // ============================================
    // Mini React v1 - 核心代码
    // ============================================

    // 文本节点标记
    const TEXT_ELEMENT = 'TEXT_ELEMENT';

    /**
     * 创建虚拟 DOM 节点
     * @param {string} type - 标签名或组件函数
     * @param {object} props - 属性对象
     * @param {...any} children - 子节点
     */
    function createElement(type, props, ...children) {
      return {
        type,
        props: props || {},
        children: children
          .flat() // 拍平嵌套数组
          .filter(child => child != null && typeof child !== 'boolean') // 过滤 null/false
          .map(child => {
            // 字符串/数字包装成文本节点
            if (typeof child === 'string' || typeof child === 'number') {
              return {
                type: TEXT_ELEMENT,
                props: { nodeValue: String(child) },
                children: []
              };
            }
            return child;
          })
      };
    }

    /**
     * 将虚拟 DOM 挂载为真实 DOM
     * @param {object} vnode - 虚拟 DOM 节点
     */
    function mount(vnode) {
      // 1. 文本节点
      if (vnode.type === TEXT_ELEMENT) {
        return document.createTextNode(vnode.props.nodeValue);
      }

      // 2. 函数组件
      if (typeof vnode.type === 'function') {
        // 执行函数组件，获取返回的虚拟 DOM
        const childVNode = vnode.type(vnode.props);
        return mount(childVNode);
      }

      // 3. 普通元素
      const dom = document.createElement(vnode.type);

      // 设置属性
      updateProps(dom, {}, vnode.props);

      // 递归挂载子节点
      vnode.children.forEach(child => {
        dom.appendChild(mount(child));
      });

      return dom;
    }

    /**
     * 更新 DOM 属性
     */
    function updateProps(dom, oldProps, newProps) {
      // 设置新属性
      Object.keys(newProps).forEach(key => {
        if (key === 'children') return;

        const value = newProps[key];

        if (key === 'className') {
          dom.className = value;
        } else if (key === 'style' && typeof value === 'object') {
          Object.assign(dom.style, value);
        } else if (key.startsWith('on') && typeof value === 'function') {
          const eventName = key.slice(2).toLowerCase();
          dom.addEventListener(eventName, value);
        } else {
          dom.setAttribute(key, value);
        }
      });
    }

    /**
     * 渲染应用
     */
    function render(element, container) {
      container.innerHTML = '';
      container.appendChild(mount(element));
    }

    // ============================================
    // 使用示例 - Hello World
    // ============================================

    // 定义一个无状态的函数组件
    function App() {
      return createElement('div', { className: 'app' },
        createElement('h1', { style: { color: '#333' } }, 'Hello, World!'),
        createElement('p', null, '这是用 Mini React 渲染的内容'),
        createElement('ul', null,
          createElement('li', null, '✓ 虚拟 DOM'),
          createElement('li', null, '✓ 函数组件'),
          createElement('li', null, '✓ 首次渲染（Mount）')
        )
      );
    }

    // 渲染到页面
    const root = document.getElementById('root');
    render(createElement(App), root);

    // 暴露到全局，方便在控制台调试
    window.MiniReact = { createElement, mount, render };
  </script>
</body>
</html>
